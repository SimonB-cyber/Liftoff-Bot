# Replace YOUR_DOMAIN with your actual domain name (e.g. liftoff.example.com)
# in every place it appears below.

events {
    worker_connections 1024;
}

http {
    upstream app {
        server app:3000;
    }

    # ── HTTP — redirect to HTTPS, but serve ACME challenge for cert renewal ──
    server {
        listen 80;
        server_name YOUR_DOMAIN;

        # Let's Encrypt webroot challenge (cert renewal)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS ─────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name YOUR_DOMAIN;

        ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

        # Modern TLS only
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;

        # Basic security headers
        add_header Strict-Transport-Security "max-age=63072000" always;
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options SAMEORIGIN;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' wss:" always;

        # ── WebSocket endpoints ──────────────────────────────────────────────
        # /ws/plugin — authenticated plugin connection (Bearer token)
        # /ws/live   — public browser clients (no auth, limited event set)
        # /ws/admin  — admin browser clients (httpOnly cookie auth)
        # Must be proxied with Upgrade/Connection headers and a long timeout
        # because both the plugin and browser clients hold persistent connections.
        location /ws/ {
            proxy_pass http://app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;
            # 24 h — keeps idle WebSocket connections alive
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ── Admin page — HTTP Basic Auth gate ───────────────────────────────
        # Prompts for credentials before the HTML page loads at all.
        # The API calls (/api/admin/*) are protected by an httpOnly cookie
        # set via POST /api/admin/login. BasicAuth guards the page itself;
        # the cookie guards the API — no header conflict.
        location = /admin.html {
            auth_basic "Liftoff Admin";
            auth_basic_user_file /etc/nginx/.htpasswd;
            proxy_pass http://app;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;
        }

        # ── REST API + static web UI ─────────────────────────────────────────
        location / {
            proxy_pass http://app;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;
        }
    }
}
